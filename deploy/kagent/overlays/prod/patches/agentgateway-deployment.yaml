apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: kagent
spec:
  replicas: 2
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: agentgateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: agentgateway
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
