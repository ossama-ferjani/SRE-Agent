# Argo CD token: run deploy/kagent/scripts/apply-secrets-from-env.sh after apply
# (creates Secret mcp-argocd-auth and patches this MCPServer env).
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-kubernetes
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: node:20-alpine
    cmd: npx
    args:
      - -y
      - mcp-server-kubernetes
    serviceAccountName: mcp-kubernetes-sa
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-prometheus
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: python:3.11-slim
    cmd: sh
    args:
      - -c
      - pip install --no-cache-dir prometheus-mcp-server && prometheus-mcp-server
    env:
      PROMETHEUS_URL: "http://kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090"
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: mcp-argocd
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: node:20-alpine
    cmd: sh
    args:
      - -c
      - npx -y argocd-mcp@latest stdio
    env:
      ARGOCD_BASE_URL: "https://argocd-server.argocd.svc.cluster.local"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      ARGOCD_API_TOKEN: ""
