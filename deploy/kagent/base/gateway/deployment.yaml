apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      containers:
        - name: agentgateway
          image: ghcr.io/agentgateway/agentgateway:0.9.0-musl
          imagePullPolicy: IfNotPresent
          args: ["-f", "/etc/agentgateway/agentgateway.yaml"]
          env:
            - name: ADMIN_ADDR
              value: "0.0.0.0:15000"
          ports:
            - name: mcp
              containerPort: 3000
            - name: llm
              containerPort: 8080
            - name: admin
              containerPort: 15000
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
      volumes:
        - name: config
          configMap:
            name: agentgateway-config
