servers:
  kubernetes:
    transport: "stdio"
    command: "npx"
    args: ["mcp-server-kubernetes"]
    description: "Kubernetes — pods, logs, events, deployments, namespaces, scale"

  prometheus:
    transport: "stdio"
    command: "prometheus-mcp-server"
    env:
      PROMETHEUS_URL: "${PROMETHEUS_URL:-http://localhost:9090}"
    description: "Prometheus — PromQL, alerts, targets, scrape health, rules"

  argo:
    transport: "stdio"
    command: "npx"
    args: ["argocd-mcp@latest", "stdio"]
    env:
      ARGOCD_BASE_URL: "${ARGOCD_URL:-https://localhost:8080}"
      ARGOCD_API_TOKEN: "${ARGOCD_TOKEN:-}"
    description: "Argo CD — app list, sync, rollback, deploy history, health"
