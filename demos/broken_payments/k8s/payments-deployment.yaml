# payments-service — intentionally broken
#
# What breaks:
#   The init container writes a Python memory-leak script into a shared volume.
#   The main container runs it: allocates 1 MiB/100ms until the 64Mi limit is
#   hit, then OOMKilled (exit 137). Kubernetes restarts it → CrashLoopBackOff.
#
# What the agent should find:
#   K8s  — pods in OOMKilled / CrashLoopBackOff, 512Mi limit breached
#   Prom — container_memory_working_set_bytes climbing to limit each cycle
#   Argo — revision v2.3.1 was the change that introduced this workload

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: production
  labels:
    app: payments
    version: v2.3.1
    demo: broken-payments
  annotations:
    deployment.reason: "feature/payment-retry-logic — introduced memory leak"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
        version: v2.3.1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Write the leak script before the main container starts
      initContainers:
        - name: write-script
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat > /scripts/leak.py << 'EOF'
              import time, http.server, threading, os

              # Memory leak: grow a list forever, 1 MiB every 100 ms
              _sink = []
              def leak():
                  while True:
                      _sink.append(b"x" * 1024 * 1024)
                      time.sleep(0.1)

              # Minimal HTTP server so Kubernetes probes can reach /healthz
              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok")
                  def log_message(self, *a): pass

              threading.Thread(target=leak, daemon=True).start()
              http.server.HTTPServer(("", 8080), Handler).serve_forever()
              EOF
          volumeMounts:
            - name: scripts
              mountPath: /scripts

      containers:
        - name: payments
          image: python:3.11-alpine
          command: ["python", "/scripts/leak.py"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi      # intentionally tight — OOMKill in ~6 seconds
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: scripts
              mountPath: /scripts

      volumes:
        - name: scripts
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: production
  labels:
    app: payments
    demo: broken-payments
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 80
      targetPort: 8080
